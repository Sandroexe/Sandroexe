<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekte | Sandro Exenberger</title>
    <style>
        :root {
            --accent: #007aff;
            --bg: #050505;
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 40px 20px; flex: 1; }
        
        /* --- REPARIERTER HEADER (STYLE WIE LAB.HTML) --- */
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-size: 2.5rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; font-family: monospace; }
        .header a { color: #555; text-decoration: none; font-size: 0.9rem; transition: 0.3s; font-family: monospace; }
        .header a:hover { color: var(--accent); }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        
        /* --- PROJEKT BOXEN MIT BLAUEM HOVER --- */
        .project-card { 
            background: #111; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .project-card:hover { 
            border-color: var(--accent); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px -10px rgba(0, 122, 255, 0.25); 
        }

        .project-img { width: 100%; height: 200px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; font-family: monospace; }
        .project-info { padding: 25px; }
        .project-info h3 { margin: 0 0 10px 0; color: var(--accent); font-family: monospace; }
        .project-info p { color: #aaa; font-size: 0.95rem; line-height: 1.6; }

        /* --- FOOTER CSS FIX --- */
        .footer-container { margin-top: 80px; padding: 40px 0; border-top: 1px solid #222; width: 100%; text-align: center; }
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; flex-wrap: wrap; }
        .social-icon { width: 32px; height: 32px; transition: transform 0.3s ease; }
        .icon-linkedin { fill: #0077b5; } .icon-instagram { fill: #E4405F; } .icon-github { fill: #ffffff; } .icon-mail { fill: var(--accent); } .icon-phone { fill: #4caf50; }
        .social-icons a:hover .social-icon { transform: scale(1.25); }
        .legal-links { font-size: 0.9rem; color: #444; margin-top: 20px; }
        .legal-links a { color: #666; margin: 0 15px; text-decoration: none; transition: 0.2s; }
        .legal-links a:hover { color: var(--accent); }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>[PROJECT_ARCHIVE]</h1>
            <a href="index.html">← TERMINATE_SESSION (BACK TO HOME)</a>
        </div>

        <div class="project-grid">
            <div class="project-card">
                <div class="project-img">[FILE_IMAGE_01]</div>
                <div class="project-info">
                    <h3> - - - </h3>
                    <p> - - - </p>
                </div>
            </div>

            <div class="project-card">
                <div class="project-img">[FILE_IMAGE_02]</div>
                <div class="project-info">
                    <h3> - - - </h3>
                    <p> - - - </p>
                </div>
            </div>
        </div>
    </div>

    <!-- ZENTRALER FOOTER -->
    {% include footer.html %}
</body>
</html>
