<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Critical</title>
    <style>
        /* --- TERMINAL STYLE --- */
        body {
            background-color: #050505;
            color: #007aff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            /* Automatisches Scrollen ermöglichen */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Der feste Header (bleibt oben oder scrollt mit, je nach Wunsch) */
        .header-area {
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            color: #ff5f56; /* Error Rot */
            text-shadow: 0 0 10px rgba(255, 95, 86, 0.5);
            display: inline-block;
        }

        /* Der Bereich für den unendlichen Text */
        #console-output {
            font-size: 1rem;
            line-height: 1.4;
            color: #aaa;
            flex: 1;
            word-break: break-all;
        }

        /* Einzelne Log-Zeilen Styles */
        .log-line { display: block; margin-bottom: 2px; }
        .log-time { color: #555; margin-right: 10px; }
        .log-error { color: #ff5f56; }
        .log-success { color: #007aff; }
        .log-sys { color: #4caf50; }

        /* Der Cursor am Ende */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1em;
            background-color: #007aff;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Der Reboot Button (Fixiert, damit man immer rauskommt) */
        .fixed-nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .btn {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #007aff;
            color: #007aff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #007aff;
            color: white;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 id="title-text"></h1><span class="cursor"></span>
    </div>

    <div id="console-output"></div>

    <div class="fixed-nav">
        <a href="index.html" class="btn">FORCE REBOOT (HOME)</a>
    </div>

    <script>
        const outputElement = document.getElementById('console-output');
        const titleElement = document.getElementById('title-text');
        
        // Zufällige technische Begriffe für den Loop
        const systemTerms = [
            "allocating_memory", "pointer_reference", "stack_overflow", "buffer_underrun", 
            "kernel_panic", "connection_refused", "resolving_host", "packet_loss", 
            "garbage_collection", "mounting_volume", "decrypting_key"
        ];
        
        const fileExtensions = [".dat", ".sys", ".log", ".bin", ".conf", ".php", ".html"];

        // 1. Start-Sequenz (Typewriter für den Titel)
        async function startSequence() {
            const title = "Error 404: Resource_Unreachable";
            for (let i = 0; i < title.length; i++) {
                titleElement.textContent += title.charAt(i);
                await new Promise(r => setTimeout(r, 50));
            }
            // Startet den unendlichen Loop
            infiniteLogLoop();
        }

        // 2. Der unendliche Loop
        function infiniteLogLoop() {
            setInterval(() => {
                addLogLine();
                // Automatisch nach unten scrollen
                window.scrollTo(0, document.body.scrollHeight);
            }, 50); // Geschwindigkeit des Scrollens (kleiner = schneller)
        }

        // Generiert eine zufällige Log-Zeile
        function addLogLine() {
            const now = new Date();
            const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}`;
            const rand = Math.random();
            
            let msg = "";
            let typeClass = "";

            if (rand < 0.1) {
                // Kritischer Fehler (Rot)
                msg = `CRITICAL: 0x${Math.floor(Math.random()*16777215).toString(16)} reference missing.`;
                typeClass = "log-error";
            } else if (rand < 0.3) {
                // System Info (Grün)
                msg = `SYSTEM: Reserving block ${Math.floor(Math.random()*9000)+1000} for recovery.`;
                typeClass = "log-sys";
            } else if (rand < 0.5) {
                // Success/Versuch (Blau)
                msg = `NETWORK: Pinging index${fileExtensions[Math.floor(Math.random()*fileExtensions.length)]}... request timed out.`;
                typeClass = "log-success";
            } else {
                // Rauschen (Grau)
                const term = systemTerms[Math.floor(Math.random() * systemTerms.length)];
                msg = `PROCESS: ${term} at address failure. Retrying...`;
                typeClass = "";
            }

            const line = document.createElement('div');
            line.classList.add('log-line');
            line.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${msg}</span>`;
            
            outputElement.appendChild(line);

            // Performance: Lösche alte Zeilen, wenn es zu viele werden (> 200), damit der Browser nicht laggt
            if (outputElement.childElementCount > 200) {
                outputElement.removeChild(outputElement.firstChild);
            }
        }

        // Start
        document.addEventListener('DOMContentLoaded', startSequence);
    </script>

</body>
</html>
