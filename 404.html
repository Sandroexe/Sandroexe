<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Connection Lost</title>
    <style>
        /* --- GRUNDDESIGN --- */
        body {
            background-color: #050505;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 1. HEADER BEREICH */
        .error-header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: #ff5f56; /* Signalrot */
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 95, 86, 0.4);
            /* Der Unterstrich */
            border-bottom: 4px solid #ff5f56;
            display: inline-block;
            padding-bottom: 10px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #007aff; /* Sandro-Blau */
            font-weight: bold;
        }

        /* 2. CMD FENSTER */
        .cmd-window {
            width: 90%;
            max-width: 700px;
            height: 400px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            overflow: hidden; /* Scrollbalken verstecken, JS scrollt */
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header Leiste vom CMD Fenster */
        .cmd-bar {
            border-bottom: 1px solid #333;
            margin: -15px -15px 10px -15px;
            padding: 5px 15px;
            background: #111;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* Der Text-Inhalt */
        #terminal-output {
            flex: 1;
            overflow-y: auto; /* Scrollen erlauben */
            font-size: 0.95rem;
            line-height: 1.4;
            /* Scrollbar verstecken für Clean-Look */
            scrollbar-width: none; 
        }
        #terminal-output::-webkit-scrollbar { display: none; }

        /* Text Styles */
        .line { display: block; margin-bottom: 2px; }
        .highlight { color: #fff; font-weight: bold; }
        .error { color: #ff5f56; }
        .warning { color: #ffbd2e; }
        .system { color: #007aff; }
        .dim { color: #555; }

        /* 3. BUTTON */
        .btn-container { margin-top: 30px; }
        
        .btn {
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #007aff;
            color: #007aff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #007aff;
            color: white;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
        }

    </style>
</head>
<body>

    <div class="error-header">
        <h1>ERROR 404</h1>
        <div class="subtitle">RESOURCE_NOT_FOUND_EXCEPTION</div>
    </div>

    <div class="cmd-window">
        <div class="cmd-bar">
            <span>root@exemail-server:~</span>
            <span>zsh</span>
        </div>
        <div id="terminal-output">
            </div>
    </div>

    <div class="btn-container">
        <a href="index.html" class="btn">System Reboot (Home)</a>
    </div>

    <script>
        const output = document.getElementById('terminal-output');

        // Die 5 Start-Meldungen (Laufen langsam durch)
        const bootSequence = [
            { text: "> Initializing connection protocol...", type: "system", delay: 200 },
            { text: "> Resolving host exemail.at...", type: "system", delay: 400 },
            { text: "> Sending GET request to requested path...", type: "highlight", delay: 300 },
            { text: "> ERROR: Target URI not found (404).", type: "error", delay: 600 },
            { text: "> CRITICAL: Resource unreachable. Dumping memory stack...", type: "warning", delay: 800 }
        ];

        // Zufällige Begriffe für den unendlichen Loop
        const technicalJargon = [
            "segmentation_fault", "buffer_overflow", "socket_timeout", "kernel_panic", 
            "allocating_virtual_memory", "pointer_reference_error", "garbage_collection", 
            "packet_loss_detected", "re-routing_packet", "handshake_failed"
        ];

        // Hilfsfunktion: Zeitstempel generieren
        function getTime() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}]`;
        }

        // Hilfsfunktion: Zeile schreiben
        function printLine(text, type = "") {
            const div = document.createElement('div');
            div.classList.add('line');
            if(type) div.classList.add(type);
            div.innerHTML = `<span class="dim">${getTime()}</span> ${text}`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight; // Immer nach unten scrollen
        }

        // 1. Start-Sequenz abspielen
        async function runBootSequence() {
            for (let item of bootSequence) {
                printLine(item.text, item.type);
                await new Promise(r => setTimeout(r, item.delay));
            }
            // Startet den unendlichen Loop nach der Sequenz
            startInfiniteLoop();
        }

        // 2. Unendlicher Loop
        function startInfiniteLoop() {
            setInterval(() => {
                const rand = Math.random();
                let msg = "";
                let style = "";

                if (rand < 0.1) {
                    msg = `FATAL: 0x${Math.floor(Math.random()*999999)} address invalid.`;
                    style = "error";
                } else if (rand < 0.3) {
                    msg = `INFO: Retrying connection to port ${Math.floor(Math.random()*65000)}...`;
                    style = "system";
                } else {
                    const term = technicalJargon[Math.floor(Math.random() * technicalJargon.length)];
                    msg = `DEBUG: Process ${term} terminated unexpectedly.`;
                    style = "dim";
                }

                printLine(msg, style);

                // Performance: Löschen, wenn mehr als 100 Zeilen, damit Browser nicht hängt
                if (output.childElementCount > 100) {
                    output.removeChild(output.firstChild);
                }

            }, 50); // Geschwindigkeit (50ms = sehr schnell)
        }

        // Los geht's
        document.addEventListener('DOMContentLoaded', runBootSequence);
    </script>

</body>
</html>
