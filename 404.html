<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Failure</title>
    <style>
        /* --- TERMINAL STYLE --- */
        body {
            background-color: #0f0f0f;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: left;
        }

        .terminal-container {
            max-width: 600px;
            width: 90%;
        }

        /* Der große 404 Header */
        h1 {
            font-size: 4rem;
            margin: 0 0 20px 0;
            color: #ff5f56; /* Fehler-Rot */
            text-shadow: 0 0 10px rgba(255, 95, 86, 0.5);
            min-height: 1.2em;
        }

        /* Die Log-Zeilen */
        .log-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #007aff; /* Sandro-Blau */
            margin-bottom: 5px;
            display: block;
        }

        /* Blinkender Cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #007aff;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Der Button (am Anfang unsichtbar) */
        .btn-container {
            margin-top: 40px;
            opacity: 0; /* Versteckt bis Animation fertig */
            transition: opacity 1s ease-in;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid #007aff;
            background: transparent;
            color: #007aff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #007aff;
            color: white;
            box-shadow: 0 0 15px #007aff;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <h1 id="error-title"></h1>
        
        <div id="console-output"></div>
        
        <span class="cursor"></span>

        <div class="btn-container" id="home-btn">
            <a href="index.html" class="btn">Execute: Reboot_System (Home)</a>
        </div>
    </div>

    <script>
        // TEXT KONFIGURATION
        const titleText = "Error 404";
        const logLines = [
            "> Initiating connection request...",
            "> Resolving host exemail.at...",
            "> FAILED: Target URI not found.",
            "> Error: Resource is offline or does not exist.",
            "> System halted."
        ];

        const titleElement = document.getElementById('error-title');
        const outputElement = document.getElementById('console-output');
        const btnElement = document.getElementById('home-btn');
        const cursor = document.querySelector('.cursor');

        // VERZÖGERUNGS-FUNKTION (Sleep)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // TYPEWRITER FUNKTION
        async function typeWriter() {
            
            // 1. Titel tippen (Error 404)
            for (let i = 0; i < titleText.length; i++) {
                titleElement.textContent += titleText.charAt(i);
                await sleep(150); // Tipp-Geschwindigkeit Titel
            }

            await sleep(500); // Kurz warten nach Titel

            // 2. Log-Zeilen tippen
            for (let line of logLines) {
                const p = document.createElement('div');
                p.classList.add('log-text');
                outputElement.appendChild(p); // Neue Zeile erstellen

                // Cursor verschieben (visuell tricksen wir, indem wir den Cursor immer am Ende halten, aber hier reicht der globale Cursor)
                
                for (let i = 0; i < line.length; i++) {
                    p.textContent += line.charAt(i);
                    // Zufällige Tipp-Geschwindigkeit für Realismus
                    await sleep(Math.random() * 30 + 30); 
                }
                await sleep(300); // Pause zwischen Zeilen
            }

            // 3. Button einblenden
            await sleep(500);
            btnElement.style.opacity = 1;
            
            // Cursor ausblenden (optional, oder weiterblinken lassen)
            // cursor.style.display = 'none'; 
        }

        // START
        document.addEventListener('DOMContentLoaded', typeWriter);
    </script>

</body>
</html>
