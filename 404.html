<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Network Unreachable</title>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { font-size: 8rem; margin: 0; color: #333; text-shadow: 2px 2px 0px #007aff; animation: glitch 1s infinite; }
        p { color: #007aff; font-size: 1.2rem; }
        .btn { margin-top: 30px; padding: 12px 24px; border: 1px solid #007aff; color: #fff; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #007aff; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>> ERROR: PAGE_NOT_FOUND_EXCEPTION</p>
    <p>> SYSTEM HALTED.</p>
    <a href="index.html" class="btn">REBOOT SYSTEM (HOME)</a>
</body>
</html>
