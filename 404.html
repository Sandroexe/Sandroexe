<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Failure</title>
    <style>
        /* --- TERMINAL STYLE --- */
        body {
            background-color: #050505;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: left;
            /* Der rote Atem-Effekt */
            animation: red-breath 4s ease-in-out infinite;
        }

        /* DIE ATEM-ANIMATION (Rot pulsierender Rand) */
        @keyframes red-breath {
            0% { box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.2); }
            50% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.7); }
            100% { box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.2); }
        }

        .terminal-container {
            max-width: 650px;
            width: 90%;
            z-index: 2; /* Über dem Schatten liegen */
        }

        /* Der große 404 Header */
        h1 {
            font-size: 5rem;
            margin: 0 0 10px 0;
            color: #ff5f56; /* Fehler-Rot */
            text-shadow: 0 0 20px rgba(255, 95, 86, 0.8);
            letter-spacing: -2px;
            min-height: 1.2em;
        }

        /* Die Log-Zeilen */
        .log-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #007aff; /* Sandro-Blau */
            margin-bottom: 5px;
            display: block;
            font-weight: 500;
        }

        /* Blinkender Cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #007aff;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Der Button (am Anfang unsichtbar) */
        .btn-container {
            margin-top: 50px;
            opacity: 0; /* Versteckt bis Animation fertig */
            transition: opacity 1.5s ease-in;
        }

        .btn {
            padding: 14px 28px;
            border: 2px solid #ff5f56; /* Roter Rahmen passend zum Alarm */
            background: rgba(255, 95, 86, 0.1);
            color: #ff5f56;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 95, 86, 0.2);
        }

        .btn:hover {
            background: #ff5f56;
            color: white;
            box-shadow: 0 0 30px #ff5f56;
        }
        
        /* Scanline Effekt (Optionaler Monitor-Look) */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="terminal-container">
        <h1 id="error-title"></h1>
        
        <div id="console-output"></div>
        
        <span class="cursor"></span>

        <div class="btn-container" id="home-btn">
            <a href="index.html" class="btn">Emergency Reboot (Home)</a>
        </div>
    </div>

    <script>
        // TEXT KONFIGURATION
        const titleText = "ERROR 404";
        const logLines = [
            "> SYSTEM ALERT: Critical failure detected.",
            "> Analyzing network path to 'exemail.at'...",
            "> ERROR: Target resource unreachable.",
            "> DIAGNOSTIC: Page does not exist or was moved.",
            "> INITIATING FAILSAFE PROTOCOL..."
        ];

        const titleElement = document.getElementById('error-title');
        const outputElement = document.getElementById('console-output');
        const btnElement = document.getElementById('home-btn');

        // VERZÖGERUNGS-FUNKTION (Sleep)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // TYPEWRITER FUNKTION
        async function typeWriter() {
            
            // 1. Titel tippen (Error 404)
            for (let i = 0; i < titleText.length; i++) {
                titleElement.textContent += titleText.charAt(i);
                await sleep(200); // Langsam und dramatisch
            }

            await sleep(800); // Kurz warten

            // 2. Log-Zeilen tippen
            for (let line of logLines) {
                const p = document.createElement('div');
                p.classList.add('log-text');
                
                // Färbe die Zeile rot wenn "ERROR" oder "ALERT" vorkommt
                if(line.includes("ERROR") || line.includes("ALERT") || line.includes("FAILSAFE")) {
                    p.style.color = "#ff5f56";
                }
                
                outputElement.appendChild(p); 

                for (let i = 0; i < line.length; i++) {
                    p.textContent += line.charAt(i);
                    await sleep(Math.random() * 20 + 20); // Schnelles Tippen
                }
                await sleep(400); // Pause zwischen Zeilen
            }

            // 3. Button einblenden
            await sleep(600);
            btnElement.style.opacity = 1;
        }

        // START
        document.addEventListener('DOMContentLoaded', typeWriter);
    </script>

</body>
</html>
