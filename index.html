<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Exenberger</title>
    <style>
        /* Grunddesign (Dark Mode) */
        body {
            background-color: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Volle Bildschirmhöhe */
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Typografie */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        /* Links allgemein */
        a {
            color: #007aff;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 0.7;
        }

        /* Der blaue Button */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 24px;
            background-color: #007aff;
            color: white;
            border-radius: 99px; /* Runde "Pill"-Form */
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); /* Leichter Schein */
        }
        .btn:hover {
            background-color: #0062cc;
            color: white;
            opacity: 1;
            transform: scale(1.02); /* Leichter Zoom-Effekt */
        }

        /* Fußzeile (Impressum Link) */
        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
        }
        .footer a {
            color: #444; /* Sehr dezent grau */
            border-bottom: 1px solid transparent;
        }
        .footer a:hover {
            color: #888;
            border-bottom: 1px solid #888;
        }
    </style>
</head>
<body>

    <div>
        <h1>Sandro Exenberger</h1>
        <p>Willkommen auf meiner persönlichen Website.<br>Hier findest du meine Kontaktmöglichkeiten.</p>
        
        <p>
            E-Mail: <br>
            <a href="mailto:sandro@exemail.at">sandro@exemail.at</a>
        </p>

        <a href="https://www.linkedin.com/in/sandro-exenberger-1a5486315/" class="btn" target="_blank">
            Mein LinkedIn Profil
        </a>
    </div>

    <div class="footer">
        <a href="impressum.html">Impressum</a>
    </div>

</body>
</html>
