<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Exenberger</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { max-width: 600px; width: 100%; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.5px; }
        p { font-size: 1.1rem; color: #aaa; margin-bottom: 1.5rem; line-height: 1.6; }
        a { color: #007aff; text-decoration: none; transition: opacity 0.2s; }
        a:hover { opacity: 0.8; }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #007aff;
            color: white;
            border-radius: 99px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            text-decoration: none;
        }
        .btn:hover { background-color: #0062cc; transform: scale(1.02); color: white; }

        /* Footer Styling */
        .footer-container { 
            margin-top: 80px; 
            padding-top: 30px; 
            border-top: 1px solid #222; 
            width: 100%; 
        }
        
        .social-icons { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin: 20px 0; 
        }
        
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background-color: #007aff;
            transform: scale(1.15);
        }
        
        .social-icon { 
            width: 20px; 
            height: 20px; 
            color: #aaa;
            transition: color 0.3s ease;
        }
        
        .social-link:hover .social-icon {
            color: white;
        }
        
        .legal-links { 
            font-size: 0.85rem; 
            color: #444; 
            margin-top: 20px;
        }
        
        .legal-links a { 
            color: #666; 
            margin: 0 10px; 
            text-decoration: none;
        }
        
        .legal-links a:hover { 
            color: #aaa; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sandro Exenberger</h1>
        <p>Willkommen auf meiner persönlichen Website.<br>Hier findest du meine Kontaktmöglichkeiten.</p>
        
        <!-- Dieser Container wird von footer.js automatisch gefüllt -->
        <div id="central-footer"></div>
    </div>
    
    <!-- Scripts in richtiger Reihenfolge laden -->
    <script src="config.js"></script>
    <script src="footer.js"></script>
</body>
</html>
