<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Exenberger | Links</title>
    <style>
        :root {
            --accent: #007aff;
            --bg: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.95);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 60px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        /* --- DER PROFIL-KREIS MIT FOTO --- */
        .profile-img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--accent); 
            margin-bottom: 20px; 
            object-fit: cover; /* Verhindert Verzerrung des Bildes */
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
            background: #222;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px; }
        .tagline { color: #888; font-size: 0.95rem; margin-bottom: 40px; font-weight: 500; }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #333; 
            padding: 18px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: #fff; 
            text-align: center; 
            font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-btn:hover { 
            border-color: var(--accent); 
            transform: translateY(-3px) scale(1.02); 
            background: rgba(0, 122, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2);
        }

        /* Spezieller Button-Stil für die Hauptseite */
        .link-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        .link-btn.primary:hover {
            background: #0056b3;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.4);
        }

        .back-home { 
            margin-top: 50px; 
            color: #555; 
            text-decoration: none; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }
        .back-home:hover { color: var(--accent); }

        /* Fallback falls das Bild nicht lädt */
        .profile-img:before {
            content: "SE";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            color: var(--accent);
            font-weight: bold;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <!-- 
        WICHTIG: Stelle sicher, dass die Datei 'profile.jpg' 
        im selben Ordner wie diese HTML-Datei liegt! 
    -->
    <img src="profile.jpg" alt="Sandro Exenberger" class="profile-img" onerror="this.style.display='none'; document.querySelector('.fallback').style.display='flex';">
    
    <!-- Fallback-Initialen, falls das Bild fehlt -->
    <div class="profile-img fallback" style="display:none; align-items:center; justify-content:center; font-weight:bold; font-size:2rem; color:var(--accent);">SE</div>

    <h1>Sandro Exenberger</h1>
    <div class="tagline">Elektroniker & Netzwerktechniker</div>

    <div class="links-container">
        <a href="https://www.linkedin.com/in/sandro-exenberger-1a5486315/" target="_blank" class="link-btn">LinkedIn</a>
        <a href="https://github.com/Sandroexe" target="_blank" class="link-btn">GitHub</a>
        <a href="https://instagram.com/sandro_exe_2008" target="_blank" class="link-btn">Instagram</a>
        <a href="mailto:sandro@exemail.at" class="link-btn">E-Mail Kontakt</a>
        
        <!-- Link zurück zum Haupt-Portfolio -->
        <a href="index.html" class="link-btn primary">Mein Portfolio besuchen</a>
    </div>

    <a href="index.html" class="back-home">← Zurück zu exemail.at</a>
</body>
</html>
